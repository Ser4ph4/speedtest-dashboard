services:
  speedwatch:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: speedtest-dashboard
    restart: unless-stopped
    ports:
      - "5300:5000"
    environment:
      - TZ=America/Sao_Paulo
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - DB_PATH=/data/speedtest.db
    volumes:
      - /opt/stacks/speedtest-dashboard/data:/data

networks:
  default:
    name: speedtest-net
